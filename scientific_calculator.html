<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scientific Calculator</title>
  <style>
    :root{
      --bg:#0f172a; /* slate-900 */
      --panel:#0b1220;
      --accent:#06b6d4; /* cyan-400 */
      --muted:#94a3b8;
      --glass: rgba(255,255,255,0.04);
      --btn:#111827;
    }
    *{box-sizing:border-box;font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#071028 0%,var(--bg) 100%);color:#e6eef6}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
    .calc{
      width:420px;
      max-width:96vw;
      border-radius:16px;padding:18px;background:linear-gradient(180deg,rgba(255,255,255,0.02), rgba(255,255,255,0.01));box-shadow:0 8px 30px rgba(2,6,23,0.6);
    }
    .screen{
      background:var(--panel);border-radius:10px;padding:14px 12px;margin-bottom:14px;display:flex;flex-direction:column;gap:6px;min-height:84px
    }
    .history{font-size:13px;color:var(--muted);min-height:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .display{font-size:28px;font-weight:600;line-height:1.1;text-align:right;word-break:break-all}
    .kbd{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
    button{background:var(--btn);border:0;padding:14px;border-radius:8px;color:inherit;font-size:15px;cursor:pointer;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.25)}
    button:active{transform:translateY(1px)}
    .op{background:linear-gradient(180deg,rgba(255,255,255,0.02),var(--glass));}
    .accent{background:linear-gradient(180deg, rgba(6,182,212,0.12), rgba(6,182,212,0.08));color:var(--accent);font-weight:600}
    .wide{grid-column:span 2}
    .span3{grid-column:span 3}
    .muted{color:var(--muted);font-size:13px}
    footer{margin-top:12px;color:var(--muted);font-size:13px;text-align:center}
    @media (max-width:420px){.kbd{grid-template-columns:repeat(4,1fr)} }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="calc" role="application" aria-label="Scientific calculator">
      <div class="screen" id="screen">
        <div class="history" id="history" aria-live="polite"></div>
        <div class="display" id="display">0</div>
      </div>

      <div class="kbd" id="keys">
        <!-- Row 1 -->
        <button class="op" data-action="clear" title="Clear (Esc)">C</button>
        <button class="op" data-action="back" title="Backspace (Backspace)">⌫</button>
        <button class="op" data-value="(" title="Open parenthesis">(</button>
        <button class="op" data-value=")" title="Close parenthesis">)</button>
        <button class="op" data-action="percent" title="Percent">%</button>
        <button class="accent" data-action="ans" title="Use previous answer">Ans</button>

        <!-- Row 2 -->
        <button class="op" data-action="func" data-value="sin(" title="sin">sin</button>
        <button class="op" data-action="func" data-value="cos(" title="cos">cos</button>
        <button class="op" data-action="func" data-value="tan(" title="tan">tan</button>
        <button class="op" data-action="func" data-value="log(" title="log10">log</button>
        <button class="op" data-action="func" data-value="ln(" title="ln">ln</button>
        <button class="op" data-action="const" data-value="pi" title="π (pi)">π</button>

        <!-- Row 3 -->
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="op" data-value="^" title="power">xʸ</button>
        <button class="op" data-action="func" data-value="sqrt(" title="square root">√</button>
        <button class="op" data-action="func" data-value="!" title="factorial">!</button>

        <!-- Row 4 -->
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="op" data-value="*">×</button>
        <button class="op" data-action="mem" data-value="m+" title="Memory add">M+</button>
        <button class="op" data-action="mem" data-value="m-" title="Memory subtract">M-</button>

        <!-- Row 5 -->
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="op" data-value="-">−</button>
        <button class="op" data-action="mem" data-value="mr" title="Memory recall">MR</button>
        <button class="op" data-action="mem" data-value="mc" title="Memory clear">MC</button>

        <!-- Row 6 -->
        <button data-value="0" class="span3">0</button>
        <button data-value="." title="decimal point">.</button>
        <button class="op" data-value="+">+</button>
        <button class="accent" data-action="equals" class="wide" title="Equals (Enter)">=</button>
      </div>

      <footer>
        Tip: use keyboard (numbers, + - * / Enter). Functions expect radians. 
      </footer>
    </main>
  </div>

  <script>
  // Scientific calculator with expression parser (shunting-yard) and RPN evaluator.
  // Supports: + - * / ^ % parentheses, functions: sin,cos,tan,log,ln,sqrt, factorial (!), constants: pi,e
  // Memory: M+, M-, MR, MC and Ans

  (function(){
    const display = document.getElementById('display');
    const history = document.getElementById('history');
    const keys = document.getElementById('keys');

    let expr = '';
    let mem = 0;
    let lastAns = '';

    function update(){
      display.textContent = expr || '0';
    }

    function pushToken(tok){
      expr += tok;
      update();
    }

    keys.addEventListener('click', e=>{
      const btn = e.target.closest('button'); if(!btn) return;
      const val = btn.getAttribute('data-value');
      const action = btn.getAttribute('data-action');
      handleInput(action,val);
    });

    document.addEventListener('keydown', e=>{
      if(e.ctrlKey||e.metaKey) return;
      const key = e.key;
      if(/^[0-9.]$/.test(key)) { handleInput(null,key); e.preventDefault(); return; }
      if(key==='Enter') { handleInput('equals'); e.preventDefault(); return; }
      if(key==='Backspace') { handleInput('back'); e.preventDefault(); return; }
      if(key==='Escape') { handleInput('clear'); e.preventDefault(); return; }
      if(key==='+'||key==='-'||key==='*'||key==='/'||key==='('||key===')') { handleInput(null,key); e.preventDefault(); return; }
      if(key==='^') { handleInput(null,'^'); e.preventDefault(); return; }
      if(key==='%') { handleInput('percent'); e.preventDefault(); return; }
    });

    function handleInput(action,val){
      if(action===null){ pushToken(val); return; }
      switch(action){
        case 'clear': expr=''; history.textContent=''; update(); break;
        case 'back': expr = expr.slice(0,-1); update(); break;
        case 'percent': pushToken('%'); break;
        case 'equals': try{ const res = evaluateExpression(expr); history.textContent = expr + ' ='; expr = String(res); lastAns = expr; update(); } catch(err){ display.textContent = 'Error'; console.error(err); }
          break;
        case 'func':
          // Some functions are postfix (factorial), others are prefix
          if(val==='!'){
            pushToken('!');
          } else {
            pushToken(val);
          }
          break;
        case 'const':
          if(val==='pi') pushToken(String(Math.PI));
          else pushToken(val);
          break;
        case 'mem':
          handleMemory(val); break;
        case 'ans':
          pushToken(lastAns || '0'); break;
        default: break;
      }
    }

    function handleMemory(cmd){
      try{
        if(cmd==='m+'){
          const v = Number(evaluateExpression(expr||'0')); mem += v; history.textContent='M+= ' + v; expr=''; update();
        } else if(cmd==='m-'){
          const v = Number(evaluateExpression(expr||'0')); mem -= v; history.textContent='M-= ' + v; expr=''; update();
        } else if(cmd==='mr'){
          pushToken(String(mem));
        } else if(cmd==='mc'){
          mem = 0; history.textContent='MC';
        }
      }catch(e){ display.textContent='Error'; }
    }

    // --- Expression evaluation ---
    function tokenize(s){
      const tokens = [];
      const re = /\s*([0-9]*\.?[0-9]+|pi|e|sin|cos|tan|log|ln|sqrt|\^|\.|\+|\-|\*|\/|\(|\)|%|!|,)/ig;
      let m; let i=0;
      while(i<s.length){
        if(/\s/.test(s[i])){ i++; continue; }
        // number
        if(/[0-9\.]/.test(s[i])){
          let num=''; while(i<s.length && /[0-9\.]/.test(s[i])){ num+=s[i++]; }
          tokens.push({type:'number',value:parseFloat(num)}); continue;
        }
        // identifiers/functions
        if(/[a-zA-Z]/.test(s[i])){
          let id=''; while(i<s.length && /[a-zA-Z]/.test(s[i])) id+=s[i++]; id = id.toLowerCase();
          tokens.push({type:'func',value:id}); continue;
        }
        // operators and punctuation
        const ch = s[i];
        if(ch==='+'||ch==='-'||ch==='*'||ch==='/'||ch==='^'||ch==='('||ch===')'||ch==='%'||ch===','||ch==='!'){
          tokens.push({type:'op',value:ch}); i++; continue;
        }
        // unrecognized
        throw new Error('Unexpected char: '+s[i]);
      }
      return tokens;
    }

    function isFunc(name){ return ['sin','cos','tan','log','ln','sqrt'].includes(name); }

    function preced(op){
      if(op==='+'||op==='-') return 2;
      if(op==='*'||op==='/'||op==='%') return 3;
      if(op==='^') return 4;
      if(op==='!') return 5; // factorial highest
      return 0;
    }

    function isRightAssoc(op){ return op==='^' || op==='!'; }

    function shuntingYard(tokens){
      const out=[]; const ops=[];
      let prev=null;
      for(let t of tokens){
        if(t.type==='number') { out.push(t); }
        else if(t.type==='func'){
          if(isFunc(t.value)) ops.push(t);
          else if(t.value==='pi') out.push({type:'number',value:Math.PI});
          else if(t.value==='e') out.push({type:'number',value:Math.E});
          else throw new Error('Unknown identifier: '+t.value);
        }
        else if(t.type==='op'){
          const v=t.value;
          if(v==='('){ ops.push(t); }
          else if(v===')'){
            while(ops.length && ops[ops.length-1].value!=='('){ out.push(ops.pop()); }
            if(!ops.length) throw new Error('Mismatched parentheses');
            ops.pop(); // pop '('
            if(ops.length && ops[ops.length-1].type==='func') out.push(ops.pop());
          } else {
            // handle unary minus: if v is - and prev is null or operator or '('
            if(v==='-' && (prev===null || (prev.type==='op' && prev.value!==
'!') || (prev.type==='func' && prev.value==='(') )){
              // treat unary minus as 0 -
              out.push({type:'number',value:0});
            }
            while(ops.length){
              const top = ops[ops.length-1];
              if(top.type==='op' && top.value!=='(' && ((isRightAssoc(v) && preced(v)<preced(top.value)) || (!isRightAssoc(v) && preced(v)<=preced(top.value)))){
                out.push(ops.pop());
              } else break;
            }
            ops.push(t);
          }
        }
        prev = t;
      }
      while(ops.length){ const t = ops.pop(); if(t.value==='('||t.value===')') throw new Error('Mismatched parentheses'); out.push(t); }
      return out;
    }

    function factorial(n){
      if(n<0) throw new Error('Factorial negative');
      if(Math.floor(n)!==n) throw new Error('Factorial non-integer');
      let r=1; for(let i=2;i<=n;i++) r*=i; return r;
    }

    function evalRPN(rpn){
      const st = [];
      for(let t of rpn){
        if(t.type==='number') st.push(t.value);
        else if(t.type==='func'){
          const f = t.value;
          if(st.length<1) throw new Error('Not enough args for function');
          const a = st.pop();
          if(f==='sin') st.push(Math.sin(a));
          else if(f==='cos') st.push(Math.cos(a));
          else if(f==='tan') st.push(Math.tan(a));
          else if(f==='sqrt') st.push(Math.sqrt(a));
          else if(f==='ln') st.push(Math.log(a));
          else if(f==='log') st.push(Math.log10 ? Math.log10(a) : Math.log(a)/Math.LN10);
          else throw new Error('Unknown func '+f);
        }
        else if(t.type==='op'){
          const op = t.value;
          if(op==='!'){
            const a = st.pop(); st.push(factorial(a));
          } else {
            const b = st.pop(); const a = st.pop();
            if(a===undefined || b===undefined) throw new Error('Not enough operands');
            if(op==='+') st.push(a+b);
            else if(op==='-') st.push(a-b);
            else if(op==='*') st.push(a*b);
            else if(op==='/') st.push(a/b);
            else if(op==='^') st.push(Math.pow(a,b));
            else if(op==='%') st.push(a % b);
            else throw new Error('Unknown op '+op);
          }
        }
      }
      if(st.length!==1) throw new Error('Invalid expression');
      let res = st[0];
      // tidy floating point
      if(Math.abs(res) < 1e-12) res = 0;
      if(!Number.isInteger(res)) res = parseFloat(res.toPrecision(12));
      return res;
    }

    function evaluateExpression(s){
      if(!s) return 0;
      // replace unicode signs
      s = s.replace(/×/g,'*').replace(/−/g,'-');
      // handle implicit multiplication: e.g. 2pi or 2( or )(
      s = s.replace(/(\d)(\s*)(pi|e|\()/gi, (m,a,b,c)=> a+'*'+c);
      // tokenize
      const tokens = tokenize(s);
      const rpn = shuntingYard(tokens);
      return evalRPN(rpn);
    }

    // init
    update();

  })();
  </script>
</body>
</html>
